name: inbill
description: Inbill - Production-ready Desktop Billing & POS for Indian Businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # State Management
  provider: ^6.1.2

  # PDF Generation
  pdf: ^3.11.1
  printing: ^5.13.1

  # UI
  fl_chart: ^0.69.0
  data_table_2: ^2.5.14
  flutter_animate: ^4.5.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  csv: ^6.0.0
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  image_picker: ^1.1.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.1

  # Barcode
  mobile_scanner: ^5.2.3

  # Icons
  flutter_svg: ^2.0.10+1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/templates/
